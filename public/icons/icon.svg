<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#2E7D32"/>

  <!-- Inner background -->
  <circle cx="256" cy="256" r="220" fill="#ffffff"/>

  <!-- Gold accent line at top -->
  <rect x="96" y="96" width="320" height="28" rx="8" fill="#C89B6D"/>

  <!-- 5 vertical planks forming W shape -->
  <!-- Plank 1 - left tall -->
  <rect x="108" y="140" width="52" height="276" rx="8" fill="#5C3A1E"/>

  <!-- Plank 2 - left-center diagonal down -->
  <rect x="176" y="140" width="52" height="220" rx="8" fill="#8B5A2B"/>

  <!-- Plank 3 - center (middle of W, shorter) -->
  <rect x="244" y="140" width="44" height="160" rx="8" fill="#5C3A1E"/>

  <!-- Plank 4 - right-center diagonal down -->
  <rect x="304" y="140" width="52" height="220" rx="8" fill="#8B5A2B"/>

  <!-- Plank 5 - right tall -->
  <rect x="372" y="140" width="52" height="276" rx="8" fill="#5C3A1E"/>
</svg>
